<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f2d1de" />
    <title>Offline - Beautiq</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #fff2f7, #ffffff 55%);
        font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #1f1f1f;
      }

      main {
        width: min(560px, 92vw);
        background: #ffffff;
        border: 1px solid #f3d6e4;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 14px 40px rgba(45, 20, 35, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.5;
        color: #4b4b4b;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-weight: 600;
        background: #f2d1de;
        color: #1f1f1f;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(0.98);
      }

      .note {
        font-size: 0.85rem;
        color: #6b6b6b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        The network connection looks unstable. You can keep working in the app,
        but any live data updates will resume once you're back online.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">
          Try again
        </button>
      </div>
      <p class="note">Tip: We'll automatically refresh once the connection returns.</p>
    </main>
    <script>
      window.addEventListener('online', () => window.location.reload());
    </script>
  </body>
</html>
